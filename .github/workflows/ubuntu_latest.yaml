name: Ubuntu latest

on:
  push:
    branches:
      - '**'   # Matches all branches on push
  pull_request:
    branches: [ main, development ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Build and run Docker container
      run: |
        docker build --progress=plain --no-cache --file test/docker/Dockerfile_ubuntu_latest --tag test-ubuntu:latest .
        docker run --rm test-ubuntu:latest
