name: Redhat ubi8

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, development ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Environment Preparation
        uses: actions/checkout@v3

      - name: Build and run docker container
        run: |
          docker build --progress=plain --no-cache --file test/docker/Dockerfile_redhat_ubi8 --tag test-redhat:ubi8 .
          docker run --rm test-redhat:ubi8
